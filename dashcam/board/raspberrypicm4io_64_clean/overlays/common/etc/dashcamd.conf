[camera]
width = 1920
height = 1080
framerate = 30
codec = h264
bitrate = 10000000
profile = high
segment_duration = 180
intra_refresh = 60

[storage]
path = /mnt/data/recordings
max_usage = 85
target_usage = 80
metadata = true

[gps]
serial = /dev/ttyAMA0
baud = 9600
osd_overlay = false
osd_format = %Y-%m-%d %H:%M:%S | %.1f km/h | %.6f, %.6f

[imu]
i2c_bus = 1
i2c_addr = 0x68
sample_rate = 50
accel_threshold = 0.8
event_pre_buffer = 30
event_post_buffer = 60
debounce_ms = 50

[parking]
entry_timeout = 300
exit_on_movement = true
wifi_in_parking = true

[led]
brightness = 255

[wifi]
ssid = hivehacker0000
password = hivehak!
channel = 6
ip = 192.168.0.10
dhcp_start = 192.168.0.11
dhcp_end = 192.168.0.50

[web]
port = 80

[ssh]
port = 22
password_auth = false