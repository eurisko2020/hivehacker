<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HiveHacker — Full Screen Live</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body style="background:#000;">
<div style="position:relative;width:100%;height:100vh;display:flex;align-items:center;justify-content:center;">
    <img src="/static/logo.png" style="max-width:100%;max-height:100vh;opacity:0.3;" alt="Live feed">
    <div class="rec-indicator" style="position:absolute;bottom:2rem;">
        <span class="rec-dot"></span><span>REC</span><span class="rec-timer">00:15:32</span>
    </div>
    <a href="/dashboard" style="position:absolute;top:1rem;left:1rem;color:#f9a826;text-decoration:none;font-size:0.9rem;background:rgba(0,0,0,0.5);padding:0.4rem 0.8rem;border-radius:6px;">← Back</a>
</div>
</body>
</html>
