<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HiveHacker — Events</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<nav class="navbar">
    <a href="/dashboard" class="nav-brand"><img src="/static/logo.png" alt="HiveHacker"><span class="nav-brand-text">HiveHacker</span></a>
    <div class="nav-links">
        <a href="/dashboard">Live</a>
        <a href="/recordings">Recordings</a>
        <a href="/events" class="active">Events</a>
        <a href="/settings">Settings</a>
        <a href="/firmware">Update</a>
        <button class="theme-toggle" onclick="toggleTheme()"></button>
    </div>
</nav>
<div class="container">
    <h2 style="color:var(--primary);margin-bottom:1rem;">Events Log ({{ events|length }})</h2>
    <a href="/api/events/export" class="btn btn-primary" style="margin-bottom:1rem;">Export CSV</a>
    {% for e in events %}
    <div class="event-item">
        <span class="event-time">{{ e.timestamp }}</span>
        <span class="event-gforce">{{ e.g_force }}G</span>
        <span class="event-type"> — {{ e.type }}</span>
        {% if e.segment %}<br><a href="/recordings" style="color:var(--primary);font-size:0.85rem;">→ {{ e.segment }}</a>{% endif %}
    </div>
    {% endfor %}
</div>
<div class="footer">Powered by <a href="https://hivehacker.ca">HiveHacker</a> | By Eurisko2020</div>
<script src="/static/app.js"></script>
</body>
</html>
